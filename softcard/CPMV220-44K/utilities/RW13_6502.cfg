# Linker config for RW13_6502.s -- embedded 6502 disk engine of RW13.COM (2.20-44K).
# The block is staged at Z-80 $0300 in the .COM and runs at Apple 6502 $1300
# (A$VEC = $1300, set by the Z-80 front end). 1792 bytes ($1300-$19FF).
MEMORY {
    RAM: start = $1300, size = $0700, file = %O;
}
SEGMENTS {
    CODE: load = RAM, type = ro;
}
